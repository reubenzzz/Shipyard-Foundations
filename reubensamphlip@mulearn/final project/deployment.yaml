apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-nginx-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nginx-app
  template:
    metadata:
      labels:
        app: nginx-app
    spec:
      containers:
      - name: nginx-container
        image: my-nginx-app:v1
        ports:
        - containerPort: 80
        env:
        - name: STUDENT_NAME
          value: "Reuben Sam Philip"